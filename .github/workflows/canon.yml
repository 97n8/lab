name: canon

# The workbook must not assert what the code says. It must be told.
# Fails if packages/golden-path and canon/*.xlsx disagree about any vocabulary.

on:
  push: { paths: ['publiclogic/packages/golden-path/src/**', 'publiclogic/canon/**'] }
  pull_request:
  workflow_dispatch:

jobs:
  canon-check:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: publiclogic } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install --quiet openpyxl
      # Producer side of the handshake: golden-path's families.json must not drift from
      # AUDIT_EVENT_FAMILIES. This is in-repo and deterministic, so it is STRICT (blocking),
      # unlike the cross-repo advisory check below.
      - name: Family authority artifact is current
        run: node scripts/emit-families.mjs --check
      # ADVISORY until the puddlejumper canon.json handshake is green on BOTH sides
      # (VAULT Bookend Event Referent, 2026-07-10). The check itself stays STRICT — it
      # exits 1 on the cross-repo `ARCHIEVE Event Family Map` (UNVERIFIABLE) — but the
      # workflow does not block merges yet. Flip `continue-on-error` off and make this a
      # required check once puddlejumper publishes the pinned families.json + the
      # human-approved ARCHIEVE map and its own CI verifies them. See CROSS_REPO_DRIFT §6.
      - name: Canon registry matches source (advisory)
        id: canon
        continue-on-error: true
        run: >
          python3 scripts/validate_canon_registry.py --check
          packages/golden-path
          canon/PublicLogic_PuddleJumper_Runtime.xlsx
      - name: Advisory status note
        if: steps.canon.outcome == 'failure'
        run: >
          echo "::notice::canon-check is ADVISORY. Only unresolved item is the cross-repo
          ARCHIEVE Event Family Map (UNVERIFIABLE until puddlejumper publishes the pinned
          handshake). Event Family (golden-path, 6) is gated and green. See
          docs/canon/CROSS_REPO_DRIFT.md §6."
